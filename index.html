<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>チー娘チャージ</title>

<style>
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    color:#fff;
    overflow:hidden;
  }

  body{
    background:#000;
  }

  #app{
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#000;
  }

  /* 上：画像エリア */
  #visual{
    position:relative;
    flex:0 0 58vh;
    min-height:320px;
    overflow:hidden;
    background:#000;
  }

  #visual img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    display:block;
    transform:scale(1.02);
  }

  #visual::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.00) 45%,
      rgba(0,0,0,0.35) 78%,
      rgba(0,0,0,0.72) 100%
    );
    pointer-events:none;
  }

  #sitePill{
    position:absolute;
    top:max(12px, env(safe-area-inset-top));
    left:50%;
    transform:translateX(-50%);
    padding:10px 18px;
    border-radius:999px;
    font-size:15px;
    color:#fff;
    background:rgba(118,104,10,0.72);
    border:1px solid rgba(255,230,120,0.16);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    z-index:2;
    white-space:nowrap;
  }

  /* 下：UIエリア */
  #panel{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    padding:18px 16px calc(16px + env(safe-area-inset-bottom));
    background:
      radial-gradient(circle at top center, rgba(255,220,120,0.10) 0%, rgba(255,220,120,0.00) 35%),
      #000;
  }

  #message{
    min-height:72px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:clamp(24px, 4vw, 34px);
    line-height:1.45;
    margin-bottom:16px;
    text-shadow:0 2px 10px rgba(0,0,0,0.55);
    white-space:pre-line;
  }

  #choices{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
  }

  .choice-btn{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    border-radius:18px;
    min-height:68px;
    background:rgba(34,34,38,0.95);
    color:#fff;
    font-size:17px;
    font-weight:500;
    box-shadow:
      0 6px 18px rgba(0,0,0,0.30),
      inset 0 1px 0 rgba(255,255,255,0.04);
    transition:transform 0.10s ease, background 0.15s ease;
  }

  .choice-btn:active{
    transform:scale(0.97);
    background:rgba(54,54,60,1);
  }

  .choice-btn.single{
    grid-column:1 / -1;
  }

  .choice-btn.share{
    background:rgba(48,48,54,0.96);
  }

  #footerText{
    margin-top:16px;
    text-align:center;
    font-size:15px;
    color:rgba(255,255,255,0.80);
  }

  #chargeFlash{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at center, rgba(255,240,180,0.55) 0%, rgba(255,220,120,0.18) 26%, rgba(255,255,255,0) 56%);
    opacity:0;
    pointer-events:none;
    z-index:20;
  }

  #chargeFlash.on{
    animation:flashAnim 0.9s ease-out forwards;
  }

  @keyframes flashAnim{
    0%{opacity:0; transform:scale(0.96);}
    18%{opacity:0.95; transform:scale(1);}
    100%{opacity:0; transform:scale(1.06);}
  }

  @media (max-width:390px){
    #visual{
      flex-basis:54vh;
      min-height:280px;
    }

    #message{
      font-size:22px;
      min-height:64px;
      margin-bottom:14px;
    }

    .choice-btn{
      min-height:64px;
      font-size:16px;
    }
  }
</style>
</head>
<body>
  <div id="app">
    <div id="visual">
      <img src="girl.png" alt="チー娘">
      <div id="sitePill">galaxie727.github.io</div>
    </div>

    <div id="panel">
      <div id="message">今日はどんな感じ？</div>
      <div id="choices"></div>
      <div id="footerText">ちょっとチャージする？</div>
    </div>
  </div>

  <div id="chargeFlash"></div>

<script>
  let step = 0;
  let mood = "";
  let detail = "";

  const messageEl = document.getElementById("message");
  const choicesEl = document.getElementById("choices");
  const footerTextEl = document.getElementById("footerText");
  const chargeFlashEl = document.getElementById("chargeFlash");

  function setMessage(text){
    messageEl.textContent = text;
  }

  function setFooter(text){
    footerTextEl.textContent = text;
  }

  function renderChoices(list){
    choicesEl.innerHTML = "";

    list.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      if(item.single) btn.classList.add("single");
      if(item.className) btn.classList.add(item.className);
      btn.textContent = item.label;
      btn.onclick = () => next(item.value);
      choicesEl.appendChild(btn);
    });
  }

  function playChargeEffect(callback){
    chargeFlashEl.classList.remove("on");
    void chargeFlashEl.offsetWidth;
    chargeFlashEl.classList.add("on");

    setTimeout(() => {
      chargeFlashEl.classList.remove("on");
      if(callback) callback();
    }, 900);
  }

  function next(choice){
    if(step === 0){
      mood = choice;

      if(choice === "good"){
        setMessage("それはいい日だね");
        setFooter("今日はいい流れかも");
        renderChoices([
          { label:"けっこう良かった", value:"good_high" },
          { label:"ふつうに良かった", value:"good_mid" },
          { label:"ちょっとだけ", value:"good_low", single:true }
        ]);
      }

      if(choice === "tired"){
        setMessage("そっか…おつかれさま");
        setFooter("少しだけ休んでこう");
        renderChoices([
          { label:"かなり疲れた", value:"tired_high" },
          { label:"少しだけ", value:"tired_mid" },
          { label:"なんとか大丈夫", value:"tired_low", single:true }
        ]);
      }

      if(choice === "down"){
        setMessage("それはキツいね");
        setFooter("無理しなくていいよ");
        renderChoices([
          { label:"結構きつい", value:"down_high" },
          { label:"少しだけ", value:"down_mid" },
          { label:"もう大丈夫", value:"down_low", single:true }
        ]);
      }

      if(choice === "neutral"){
        setMessage("そっか、来てくれたんだね");
        setFooter("なんでもない日も悪くない");
        renderChoices([
          { label:"なんとなく", value:"neutral_feel" },
          { label:"暇だった", value:"neutral_free" },
          { label:"呼ばれた気がした", value:"neutral_call", single:true }
        ]);
      }

      step = 1;
      return;
    }

    if(step === 1){
      detail = choice;
      setMessage("…じゃあ、ちょっとだけチャージするね");
      setFooter("受け取る準備はできた？");
      renderChoices([
        { label:"受け取る", value:"charge", single:true }
      ]);
      step = 2;
      return;
    }

    if(step === 2){
      setFooter("チャージ中…");
      choicesEl.innerHTML = "";

      playChargeEffect(() => {
        setMessage(getFinalMessage());
        setFooter("少しでも軽くなりますように");
        renderChoices([
          { label:"もう一回", value:"restart" },
          { label:"シェア", value:"share", className:"share" },
          { label:"終わる", value:"end", single:true }
        ]);
        step = 3;
      });
      return;
    }

    if(step === 3){
      if(choice === "restart"){
        resetApp();
        return;
      }

      if(choice === "share"){
        shareResult();
        return;
      }

      if(choice === "end"){
        setMessage("またね");
        setFooter("またチャージしに来てね");
        choicesEl.innerHTML = "";
      }
    }
  }

  function getFinalMessage(){
    if(mood === "good"){
      if(detail === "good_high") return "いい流れだね。\nそのままで大丈夫";
      if(detail === "good_mid") return "ちゃんといい日になってる。\nそれ、けっこう大事だよ";
      return "少しでも良かったなら充分。\n今日はそれでOK";
    }

    if(mood === "tired"){
      if(detail === "tired_high") return "今日はこれくらいでいいよ。\nまずはちょっと休も";
      if(detail === "tired_mid") return "少し疲れた日は、\n少し休めばいいよ";
      return "大丈夫そうでも、\n少しだけ充電しとこ";
    }

    if(mood === "down"){
      if(detail === "down_high") return "ちゃんと来ただけでもえらい。\n今日はそれで十分だよ";
      if(detail === "down_mid") return "少し落ち込む日もあるよね。\n今は無理しなくていい";
      return "もう大丈夫でも、\n少しだけ置いていこう";
    }

    if(mood === "neutral"){
      if(detail === "neutral_feel") return "なんとなく来た日にも、\nちゃんと意味あるよ";
      if(detail === "neutral_free") return "暇な時間に来てくれたの、\nちょっと嬉しい";
      return "呼ばれた気がしたなら、\nたぶん来て正解";
    }

    return "少しだけチャージ完了";
  }

  function resetApp(){
    step = 0;
    mood = "";
    detail = "";
    setMessage("今日はどんな感じ？");
    setFooter("ちょっとチャージする？");
    renderChoices([
      { label:"いい日だった", value:"good" },
      { label:"ちょっと疲れた", value:"tired" },
      { label:"落ち込んだ", value:"down" },
      { label:"なんでもない", value:"neutral" }
    ]);
  }

  async function shareResult(){
    const text = "チー娘チャージしてきた";
    try{
      if(navigator.share){
        await navigator.share({
          title:"チー娘チャージ",
          text:text
        });
      }else if(navigator.clipboard){
        await navigator.clipboard.writeText(text);
        alert("「" + text + "」をコピーしたよ");
      }else{
        alert(text);
      }
    }catch(e){}
  }

  resetApp();
</script>
</body>
</html>
