<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>チーズ牛丼娘</title>

<style>
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  }

  body{
    color:#111;
  }

  .screen{
    display:none;
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    background:#000;
  }

  .screen.active{
    display:block;
  }

  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 35%;
    display:block;
    animation:zoom 8s ease-in-out infinite alternate;
    background:#000;
  }

  @keyframes zoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.05); }
  }

  .bgShade{
    position:absolute;
    inset:0;
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,0.03) 0%,
        rgba(255,255,255,0) 32%,
        rgba(0,0,0,0.06) 70%,
        rgba(0,0,0,0.18) 100%);
    pointer-events:none;
    z-index:1;
  }

  .bubble{
    position:absolute;
    top:calc(18px + env(safe-area-inset-top));
    left:50%;
    transform:translateX(-50%);
    width:min(92vw, 760px);
    background:rgba(255,255,255,0.90);
    border-radius:24px;
    padding:20px 18px;
    text-align:center;
    font-size:clamp(18px, 4.5vw, 28px);
    font-weight:600;
    line-height:1.45;
    z-index:10;
    box-shadow:0 8px 24px rgba(0,0,0,0.14);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    white-space:pre-line;
  }

  /* 一体感重視の三角 */
  .bubble::after{
    content:"";
    position:absolute;
    bottom:-10px;
    left:60%;
    transform:translateX(-50%);
    width:22px;
    height:22px;
    background:rgba(255,255,255,0.90);
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }

  .bottomArea{
    position:absolute;
    left:0;
    right:0;
    bottom:calc(16px + env(safe-area-inset-bottom));
    z-index:20;
    padding:0 14px;
    max-height:45dvh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }

  .bottomArea::-webkit-scrollbar{
    display:none;
  }

  .buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .row{
    display:flex;
    gap:12px;
  }

  button{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    width:100%;
    min-height:64px;
    padding:16px 14px;
    border-radius:20px;
    background:rgba(214,206,186,0.92);
    color:#fff;
    font-size:clamp(16px, 4vw, 22px);
    font-weight:600;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      0 6px 18px rgba(0,0,0,0.12);
    transition:transform .1s ease, background .15s ease;
  }

  button:active{
    transform:scale(0.97);
    background:rgba(194,186,166,0.98);
  }

  .row button{
    width:50%;
  }

  .back{
    background:rgba(176,160,120,0.92);
  }

  @media (max-width:430px){
    .bubble{
      top:calc(14px + env(safe-area-inset-top));
      width:min(94vw, 760px);
      padding:18px 14px;
      border-radius:22px;
      font-size:18px;
    }

    .bubble::after{
      bottom:-9px;
      width:20px;
      height:20px;
    }

    .bottomArea{
      padding:0 12px;
      bottom:calc(12px + env(safe-area-inset-bottom));
      max-height:48dvh;
    }

    button{
      min-height:60px;
      border-radius:18px;
      font-size:16px;
    }
  }
</style>
</head>
<body>

  <!-- TOP -->
  <section id="top" class="screen active">
    <img src="girl_top.png" alt="トップ画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">今日はどうする？</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="goScreen('charge')">チャージ</button>
        <button onclick="goScreen('dice')">サイコロ</button>
        <button onclick="goScreen('special')">特別</button>
      </div>
    </div>
  </section>

  <!-- CHARGE -->
  <section id="charge" class="screen">
    <img src="girl_charge.png" alt="チャージ画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">今日はどんな感じ？</div>

    <div class="bottomArea">
      <div class="buttons">
        <div class="row">
          <button>いい日だった</button>
          <button>ちょっと疲れた</button>
        </div>
        <div class="row">
          <button>落ち込んだ</button>
          <button>なんでもない</button>
        </div>
        <button class="back" onclick="goScreen('top')">もどる</button>
      </div>
    </div>
  </section>

  <!-- DICE -->
  <section id="dice" class="screen">
    <img src="girl_dice.png" alt="サイコロ画像" class="bg">
    <div class="bgShade"></div>
    <div id="diceBubble" class="bubble">サイコロを振る？</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="rollDice()">振る</button>
        <button class="back" onclick="goScreen('top')">もどる</button>
      </div>
    </div>
  </section>

  <!-- DICE RESULT -->
  <section id="diceResult" class="screen">
    <img src="girl_dice.png" alt="サイコロ結果画像" class="bg">
    <div class="bgShade"></div>
    <div id="resultBubble" class="bubble">…</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="rollDice()">もう一回振る</button>
        <button class="back" onclick="goScreen('top')">トップへ</button>
      </div>
    </div>
  </section>

  <!-- SPECIAL -->
  <section id="special" class="screen">
    <img src="girl_special.png" alt="特別画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">特別メニューだよ。\nどれにする？</div>

    <div class="bottomArea">
      <div class="buttons">
        <button>誕生日</button>
        <button>7色チーズ牛丼</button>
        <button class="back" onclick="goScreen('top')">もどる</button>
      </div>
    </div>
  </section>

<script>
  function goScreen(id){
    document.querySelectorAll('.screen').forEach(screen => {
      screen.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  const diceResults = [
    "今日はチャージ強め",
    "今日はゆっくりしよう",
    "7色チーズ牛丼チャンス",
    "今日は何も考えない日",
    "ちょっといいことあるかも",
    "チー…ギュウ",
    "特別メニュー日和"
  ];

  function rollDice(){
    goScreen('diceResult');
    const bubble = document.getElementById('resultBubble');
    bubble.innerHTML = "コロコロ…";

    setTimeout(() => {
      const result = diceResults[Math.floor(Math.random() * diceResults.length)];
      bubble.innerHTML = "…出た\n「" + result + "」";
    }, 900);
  }
</script>

</body>
</html>
