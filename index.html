<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>チーズ牛丼娘</title>

<style>
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  }

  body{
    color:#111;
  }

  .screen{
    display:none;
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    background:#000;
  }

  .screen.active{
    display:block;
  }

  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 35%;
    display:block;
    animation:zoom 8s ease-in-out infinite alternate;
    background:#000;
    transition:transform 0.9s ease, filter 0.6s ease, opacity 0.25s ease;
  }

  .bg.chargeZoom{
    transform:scale(1.08);
    filter:brightness(1.05) saturate(1.05);
  }

  @keyframes zoom{
    from{ transform:scale(1); }
    to{ transform:scale(1.05); }
  }

  .bgShade{
    position:absolute;
    inset:0;
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,0.03) 0%,
        rgba(255,255,255,0) 32%,
        rgba(0,0,0,0.06) 70%,
        rgba(0,0,0,0.18) 100%);
    pointer-events:none;
    z-index:1;
  }

  .bubble{
    position:absolute;
    top:calc(18px + env(safe-area-inset-top));
    left:50%;
    transform:translateX(-50%);
    width:min(92vw, 760px);
    background:rgba(255,255,255,0.90);
    border-radius:24px;
    padding:20px 18px;
    text-align:center;
    font-size:clamp(18px, 4.5vw, 28px);
    font-weight:600;
    line-height:1.45;
    z-index:10;
    box-shadow:0 8px 24px rgba(0,0,0,0.14);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    white-space:pre-line;
  }

  .bubble::after{
    content:"";
    position:absolute;
    bottom:-10px;
    left:60%;
    transform:translateX(-50%);
    width:22px;
    height:22px;
    background:rgba(255,255,255,0.90);
    clip-path:polygon(50% 100%, 0 0, 100% 0);
  }

  .bottomArea{
    position:absolute;
    left:0;
    right:0;
    bottom:calc(16px + env(safe-area-inset-bottom));
    z-index:20;
    padding:0 14px;
    max-height:45dvh;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }

  .bottomArea::-webkit-scrollbar{
    display:none;
  }

  .buttons{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .row{
    display:flex;
    gap:12px;
  }

  button{
    appearance:none;
    -webkit-appearance:none;
    border:none;
    width:100%;
    min-height:64px;
    padding:16px 14px;
    border-radius:20px;
    background:rgba(214,206,186,0.92);
    color:#fff;
    font-size:clamp(16px, 4vw, 22px);
    font-weight:600;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.18),
      0 6px 18px rgba(0,0,0,0.12);
    transition:transform .1s ease, background .15s ease;
  }

  button:active{
    transform:scale(0.97);
    background:rgba(194,186,166,0.98);
  }

  .row button{
    width:50%;
  }

  .back{
    background:rgba(176,160,120,0.92);
  }

  .flash{
    position:absolute;
    inset:0;
    background:radial-gradient(circle at center, rgba(255,245,200,0.55) 0%, rgba(255,235,160,0.18) 30%, rgba(255,255,255,0) 60%);
    opacity:0;
    pointer-events:none;
    z-index:15;
  }

  .flash.on{
    animation:flashAnim 0.9s ease-out forwards;
  }

  @keyframes flashAnim{
    0%{ opacity:0; transform:scale(0.96); }
    25%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.08); }
  }

  @media (max-width:430px){
    .bubble{
      top:calc(14px + env(safe-area-inset-top));
      width:min(94vw, 760px);
      padding:18px 14px;
      border-radius:22px;
      font-size:18px;
    }

    .bubble::after{
      bottom:-9px;
      width:20px;
      height:20px;
    }

    .bottomArea{
      padding:0 12px;
      bottom:calc(12px + env(safe-area-inset-bottom));
      max-height:48dvh;
    }

    button{
      min-height:60px;
      border-radius:18px;
      font-size:16px;
    }
  }
</style>
</head>
<body>

  <!-- TOP -->
  <section id="top" class="screen active">
    <img src="girl_top.png" alt="トップ画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">今日はどうする？</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="goScreen('charge')">チャージ</button>
        <button onclick="goScreen('dice')">サイコロ</button>
        <button onclick="goScreen('special')">特別</button>
      </div>
    </div>
  </section>

  <!-- CHARGE -->
  <section id="charge" class="screen">
    <img id="chargeBg" src="girl_charge.png" alt="チャージ画像" class="bg">
    <div class="bgShade"></div>
    <div id="chargeBubble" class="bubble">今日はどんな感じ？</div>
    <div id="chargeFlash" class="flash"></div>

    <div class="bottomArea">
      <div id="chargeButtons" class="buttons">
        <div class="row">
          <button onclick="selectChargeMood('good')">いい日だった</button>
          <button onclick="selectChargeMood('tired')">ちょっと疲れた</button>
        </div>
        <div class="row">
          <button onclick="selectChargeMood('down')">落ち込んだ</button>
          <button onclick="selectChargeMood('neutral')">なんでもない</button>
        </div>
        <button class="back" onclick="resetCharge()">もどる</button>
      </div>
    </div>
  </section>

  <!-- DICE -->
  <section id="dice" class="screen">
    <img src="girl_dice.png" alt="サイコロ画像" class="bg">
    <div class="bgShade"></div>
    <div id="diceBubble" class="bubble">サイコロを振る？</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="rollDice()">振る</button>
        <button class="back" onclick="goScreen('top')">もどる</button>
      </div>
    </div>
  </section>

  <!-- DICE RESULT -->
  <section id="diceResult" class="screen">
    <img src="girl_dice.png" alt="サイコロ結果画像" class="bg">
    <div class="bgShade"></div>
    <div id="resultBubble" class="bubble">…</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="rollDice()">もう一回振る</button>
        <button class="back" onclick="goScreen('top')">トップへ</button>
      </div>
    </div>
  </section>

  <!-- SPECIAL -->
  <section id="special" class="screen">
    <img src="girl_special.png" alt="特別画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">特別メニューだよ。
どれにする？</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="goScreen('birthday')">誕生日</button>
        <button onclick="goScreen('rainbow')">7色チーズ牛丼</button>
        <button class="back" onclick="goScreen('top')">もどる</button>
      </div>
    </div>
  </section>

  <!-- BIRTHDAY -->
  <section id="birthday" class="screen">
    <img src="girl_special.png" alt="誕生日画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">今日は誕生日？
じゃあ、お祝いするね</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="goScreen('birthdayCake')">ケーキを見る</button>
        <button class="back" onclick="goScreen('special')">もどる</button>
      </div>
    </div>
  </section>

  <!-- BIRTHDAY CAKE -->
  <section id="birthdayCake" class="screen">
    <img src="girl_special.png" alt="誕生日ケーキ画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">チー娘お手製ケーキだよ
残さず食べてね❤️</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="goScreen('special')">ありがとう</button>
        <button class="back" onclick="goScreen('top')">トップへ</button>
      </div>
    </div>
  </section>

  <!-- RAINBOW -->
  <section id="rainbow" class="screen">
    <img src="girl_special.png" alt="7色チーズ牛丼画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">今日は特別に
7色チーズ牛丼だよ
…たぶん大丈夫</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="goScreen('rainbowResult')">受け取る</button>
        <button class="back" onclick="goScreen('special')">もどる</button>
      </div>
    </div>
  </section>

  <!-- RAINBOW RESULT -->
  <section id="rainbowResult" class="screen">
    <img src="girl_special.png" alt="7色チーズ牛丼結果画像" class="bg">
    <div class="bgShade"></div>
    <div class="bubble">7色チーズ牛丼を
受け取った</div>

    <div class="bottomArea">
      <div class="buttons">
        <button onclick="goScreen('special')">特別メニューへ</button>
        <button class="back" onclick="goScreen('top')">トップへ</button>
      </div>
    </div>
  </section>

<script>
  function goScreen(id){
    document.querySelectorAll('.screen').forEach(screen => {
      screen.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  const chargeData = {
    good: {
      intro: "それはいい日だったね",
      result: "いい流れだね。\nそのままで大丈夫\n\nちょっとチャージ完了"
    },
    tired: {
      intro: "そっか…おつかれさま",
      result: "今日はこれくらいでいいよ。\nまずはちょっと休も\n\nちょっとチャージ完了"
    },
    down: {
      intro: "それはちょっとキツいね",
      result: "ちゃんと来ただけでもえらい。\n今日はそれで十分だよ\n\nちょっとチャージ完了"
    },
    neutral: {
      intro: "そっか、来てくれたんだね",
      result: "なんでもない日も\nちゃんと意味あるよ\n\nちょっとチャージ完了"
    }
  };

  let currentChargeMood = "";

  function resetCharge(){
    currentChargeMood = "";
    document.getElementById("chargeBubble").textContent = "今日はどんな感じ？";

    document.getElementById("chargeButtons").innerHTML = `
      <div class="row">
        <button onclick="selectChargeMood('good')">いい日だった</button>
        <button onclick="selectChargeMood('tired')">ちょっと疲れた</button>
      </div>
      <div class="row">
        <button onclick="selectChargeMood('down')">落ち込んだ</button>
        <button onclick="selectChargeMood('neutral')">なんでもない</button>
      </div>
      <button class="back" onclick="resetCharge()">もどる</button>
    `;

    document.getElementById("chargeBg").classList.remove("chargeZoom");
    goScreen("charge");
  }

  function selectChargeMood(mood){
    currentChargeMood = mood;
    document.getElementById("chargeBubble").textContent =
      chargeData[mood].intro + "\n\n…じゃあ、ちょっとだけチャージするね";

    document.getElementById("chargeButtons").innerHTML = `
      <button onclick="doCharge()">受け取る</button>
      <button class="back" onclick="resetCharge()">もどる</button>
    `;
  }

  function doCharge(){
    const flash = document.getElementById("chargeFlash");
    const bg = document.getElementById("chargeBg");

    flash.classList.remove("on");
    bg.classList.remove("chargeZoom");
    void flash.offsetWidth;

    flash.classList.add("on");
    bg.classList.add("chargeZoom");

    setTimeout(() => {
      document.getElementById("chargeBubble").textContent = chargeData[currentChargeMood].result;
      document.getElementById("chargeButtons").innerHTML = `
        <button onclick="resetCharge()">もう一回</button>
        <button class="back" onclick="goScreen('top')">トップへ</button>
      `;
      flash.classList.remove("on");
      bg.classList.remove("chargeZoom");
    }, 900);
  }

  const diceResults = [
    "今日はチャージ強め",
    "今日はゆっくりしよう",
    "7色チーズ牛丼チャンス",
    "今日は何も考えない日",
    "ちょっといいことあるかも",
    "チー…ギュウ",
    "特別メニュー日和"
  ];

  function rollDice(){
    goScreen('diceResult');
    const bubble = document.getElementById('resultBubble');
    bubble.textContent = "コロコロ…";

    setTimeout(() => {
      const result = diceResults[Math.floor(Math.random() * diceResults.length)];
      bubble.textContent = "…出た\n「" + result + "」";
    }, 900);
  }
</script>

</body>
</html>
