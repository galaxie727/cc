body {
  margin: 0;
  font-family: sans-serif;

.screen {
  display: none;

  height: 100vh;
}

.active {
  display: block;
}

.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: zoom 8s ease-in-out infinite alternate;
}

@keyframes zoom {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

.bubble {
  position: absolute;
  top: 5%;
  left: 50%;
  transform: translateX(-50%);
  width: 85%;
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 16px;
  text-align: center;
  font-size: 18px;
  font-weight: 600;
  line-height: 1.5;
}

.bubble::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 60%;
  transform: translateX(-50%);
  border-width: 10px 10px 0 10px;
  border-style: solid;
  border-color: rgba(255,255,255,0.9) transparent transparent transparent;
}

  bottom: 8%;

  display: flex;
  flex-direction: column;
  align-items: center;
}
