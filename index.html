<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>チー娘チャージ</title>

<style>
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
  }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  }

  body{
    color:#111;
  }

  #app{
    position:relative;
    width:100vw;
    height:100dvh;
    overflow:hidden;
    background:#ddd;
  }

  /* 背景画像 */
  #bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center center;
    display:block;
  }

  /* 上から下へのうっすら影 */
  #bgShade{
    position:absolute;
    inset:0;
    background:
      linear-gradient(to bottom,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.00) 35%,
        rgba(0,0,0,0.08) 72%,
        rgba(0,0,0,0.18) 100%);
    pointer-events:none;
  }

  /* URLっぽいピル */
  #sitePill{
    position:absolute;
    top:max(10px, env(safe-area-inset-top));
    left:50%;
    transform:translateX(-50%);
    z-index:20;
    min-width:180px;
    max-width:72vw;
    padding:10px 18px;
    border-radius:999px;
    background:rgba(132,115,18,0.80);
    color:#fff;
    font-size:15px;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    box-shadow:0 4px 16px rgba(0,0,0,0.18);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
  }

  /* 吹き出し */
  #bubbleWrap{
    position:absolute;
    top:calc(max(24px, env(safe-area-inset-top)) + 28px);
    left:0;
    width:100%;
    z-index:15;
    padding:0 24px;
    display:flex;
    justify-content:center;
    pointer-events:none;
  }

  #bubble{
    position:relative;
    width:min(700px, 100%);
    background:rgba(255,255,255,0.92);
    color:#111;
    border-radius:28px;
    padding:26px 28px;
    text-align:center;
    font-size:clamp(20px, 4vw, 28px);
    line-height:1.45;
    box-shadow:0 10px 30px rgba(0,0,0,0.16);
    white-space:pre-line;
  }

  #bubble::after{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%) rotate(45deg);
    bottom:-12px;
    width:24px;
    height:24px;
    background:rgba(255,255,255,0.92);
  }

  /* 下部UI */
  #bottomUI{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    z-index:18;
    padding:
      0 26px
      calc(20px + env(safe-area-inset-bottom));
  }

  #choices{
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .choice-btn{
    width:100%;
    min-height:80px;
    border:none;
    border-radius:24px;
    background:rgba(214,206,206,0.62);
    color:#fff;
    font-size:clamp(20px, 4vw, 24px);
    font-weight:500;
    letter-spacing:0.02em;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.28),
      0 8px 24px rgba(0,0,0,0.12);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    transition:transform 0.10s ease, background 0.15s ease;
  }

  .choice-btn:active{
    transform:scale(0.98);
    background:rgba(196,188,188,0.78);
  }

  .choice-btn.single{
    min-height:84px;
  }

  .choice-btn.row-half{
    width:calc(50% - 9px);
  }

  .two-col{
    display:flex;
    gap:18px;
  }

  /* チャージ発光 */
  #chargeFlash{
    position:absolute;
    inset:0;
    background:
      radial-gradient(circle at center,
        rgba(255,255,255,0.70) 0%,
        rgba(255,244,190,0.48) 18%,
        rgba(255,230,140,0.22) 32%,
        rgba(255,255,255,0) 58%);
    opacity:0;
    pointer-events:none;
    z-index:30;
  }

  #chargeFlash.on{
    animation:flashAnim 0.9s ease-out forwards;
  }

  @keyframes flashAnim{
    0%{opacity:0; transform:scale(0.96);}
    18%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1.06);}
  }

  @media (max-width: 430px){
    #bubbleWrap{
      padding:0 16px;
    }

    #bubble{
      padding:20px 18px;
      border-radius:24px;
      font-size:18px;
    }

    #bottomUI{
      padding:0 18px calc(16px + env(safe-area-inset-bottom));
    }

    .choice-btn{
      min-height:72px;
      border-radius:22px;
      font-size:18px;
    }

    .choice-btn.single{
      min-height:76px;
    }
  }
</style>
</head>
<body>
  <div id="app">
    <img id="bg" src="girl.png" alt="チー娘">
    <div id="bgShade"></div>

    <div id="sitePill">galaxie727.github.io</div>

    <div id="bubbleWrap">
      <div id="bubble">今日はどんな感じ？</div>
    </div>

    <div id="bottomUI">
      <div id="choices"></div>
    </div>

    <div id="chargeFlash"></div>
  </div>

<script>
  let step = 0;
  let mood = "";
  let detail = "";

  const bubbleEl = document.getElementById("bubble");
  const choicesEl = document.getElementById("choices");
  const flashEl = document.getElementById("chargeFlash");

  function setMessage(text){
    bubbleEl.textContent = text;
  }

  function renderChoices(list, mode = "single"){
    choicesEl.innerHTML = "";

    if(mode === "two-col"){
      for(let i = 0; i < list.length; i += 2){
        const row = document.createElement("div");
        row.className = "two-col";

        for(let j = i; j < i + 2 && j < list.length; j++){
          const item = list[j];
          const btn = document.createElement("button");
          btn.className = "choice-btn row-half";
          btn.textContent = item.label;
          btn.onclick = () => next(item.value);
          row.appendChild(btn);
        }

        if(row.children.length === 1){
          row.children[0].style.width = "100%";
        }

        choicesEl.appendChild(row);
      }
      return;
    }

    list.forEach(item => {
      const btn = document.createElement("button");
      btn.className = "choice-btn single";
      btn.textContent = item.label;
      btn.onclick = () => next(item.value);
      choicesEl.appendChild(btn);
    });
  }

  function playChargeEffect(callback){
    flashEl.classList.remove("on");
    void flashEl.offsetWidth;
    flashEl.classList.add("on");

    setTimeout(() => {
      flashEl.classList.remove("on");
      if(callback) callback();
    }, 900);
  }

  function next(choice){
    if(step === 0){
      mood = choice;

      if(choice === "good"){
        setMessage("それはいい日だね。\nどのくらい良かった？");
        renderChoices([
          { label:"けっこう良かった", value:"good_high" },
          { label:"ふつうに良かった", value:"good_mid" },
          { label:"ちょっとだけ", value:"good_low" }
        ]);
      }

      if(choice === "tired"){
        setMessage("そっか…おつかれさま。\nどんな感じ？");
        renderChoices([
          { label:"かなり疲れた", value:"tired_high" },
          { label:"少しだけ", value:"tired_mid" },
          { label:"なんとか大丈夫", value:"tired_low" }
        ]);
      }

      if(choice === "down"){
        setMessage("それはキツいね。\n今はどれに近い？");
        renderChoices([
          { label:"結構きつい", value:"down_high" },
          { label:"少しだけ", value:"down_mid" },
          { label:"もう大丈夫", value:"down_low" }
        ]);
      }

      if(choice === "neutral"){
        setMessage("そっか、来てくれたんだね。\n今日はどれ？");
        renderChoices([
          { label:"なんとなく", value:"neutral_feel" },
          { label:"暇だった", value:"neutral_free" },
          { label:"呼ばれた気がした", value:"neutral_call" }
        ]);
      }

      step = 1;
      return;
    }

    if(step === 1){
      detail = choice;
      setMessage("…じゃあ、ちょっとだけ\nチャージするね");
      renderChoices([
        { label:"受け取る", value:"charge" }
      ]);
      step = 2;
      return;
    }

    if(step === 2){
      choicesEl.innerHTML = "";
      playChargeEffect(() => {
        setMessage(getFinalMessage());
        renderChoices([
          { label:"もう一回", value:"restart" },
          { label:"シェア", value:"share" },
          { label:"終わる", value:"end" }
        ]);
        step = 3;
      });
      return;
    }

    if(step === 3){
      if(choice === "restart"){
        resetApp();
        return;
      }

      if(choice === "share"){
        shareResult();
        return;
      }

      if(choice === "end"){
        setMessage("またね。\nまたチャージしに来てね");
        choicesEl.innerHTML = "";
      }
    }
  }

  function getFinalMessage(){
    if(mood === "good"){
      if(detail === "good_high") return "ちゃんといい日になってる。\nそれ、けっこう大事だよ";
      if(detail === "good_mid") return "いい流れだね。\nそのままで大丈夫";
      return "少しでも良かったなら充分。\n今日はそれでOK";
    }

    if(mood === "tired"){
      if(detail === "tired_high") return "今日はこれくらいでいいよ。\nまずはちょっと休も";
      if(detail === "tired_mid") return "少し疲れた日は、\n少し休めばいいよ";
      return "大丈夫そうでも、\n少しだけ充電しとこ";
    }

    if(mood === "down"){
      if(detail === "down_high") return "ちゃんと来ただけでもえらい。\n今日はそれで十分だよ";
      if(detail === "down_mid") return "少し落ち込む日もあるよね。\n今は無理しなくていい";
      return "もう大丈夫でも、\n少しだけ置いていこう";
    }

    if(mood === "neutral"){
      if(detail === "neutral_feel") return "なんとなく来た日にも、\nちゃんと意味あるよ";
      if(detail === "neutral_free") return "暇な時間に来てくれたの、\nちょっと嬉しい";
      return "呼ばれた気がしたなら、\nたぶん来て正解";
    }

    return "少しだけチャージ完了";
  }

  function resetApp(){
    step = 0;
    mood = "";
    detail = "";

    setMessage("今日はどんな感じ？");
    renderChoices([
      { label:"いい日だった", value:"good" },
      { label:"ちょっと疲れた", value:"tired" },
      { label:"落ち込んだ", value:"down" },
      { label:"なんでもない", value:"neutral" }
    ], "two-col");
  }

  async function shareResult(){
    const text = "チー娘チャージしてきた";
    try{
      if(navigator.share){
        await navigator.share({
          title:"チー娘チャージ",
          text:text
        });
      }else if(navigator.clipboard){
        await navigator.clipboard.writeText(text);
        alert("「" + text + "」をコピーしたよ");
      }else{
        alert(text);
      }
    }catch(e){}
  }

  resetApp();
</script>
</body>
</html>
